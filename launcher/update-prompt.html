<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Update Available</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-app-region: drag;
            user-select: none;
        }

        h2 {
            margin-top: 0;
            font-size: 18px;
            color: #ffffff;
        }

        p {
            font-size: 14px;
            color: #a6adc8;
            line-height: 1.5;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            -webkit-app-region: no-drag;
        }

        button {
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .btn-update {
            background-color: #cba6f7;
            color: #11111b;
        }

        .btn-update:hover {
            background-color: #b4befe;
        }

        .btn-skip {
            background-color: #313244;
            color: #cdd6f4;
        }

        .btn-skip:hover {
            background-color: #45475a;
        }

        .version-badge {
            background: #45475a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: #cba6f7;
        }
    </style>
</head>
<body>
    <h2>Update Available</h2>
    <p>A new version of JagProx is available: <span id="version" class="version-badge">v0.0.0</span>. Would you like to update now?</p>

    <div class="actions">
        <button class="btn-skip" onclick="skip()">Skip for now</button>
        <button class="btn-update" onclick="update()">Update Now</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        
        ipcRenderer.on('version-info', (event, version) => {
            document.getElementById('version').innerText = 'v' + version;
        });

        function skip() {
            ipcRenderer.send('update-response', 'skip');
        }

        function update() {
            ipcRenderer.send('update-response', 'update');
        }
    </script>
</body>
</html>
